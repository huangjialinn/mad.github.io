<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-radial"></div>
  <div class="bg-image"></div>
  <div class="bg-aurora"></div>
  <div class="bg-stars"></div>
  <div class="bg-stars-far"></div>
  <div class="bg-starflow"></div>
  <div class="bg-grid"></div>
  <div class="page">
    <div class="top-ticker" aria-label="滚动公告">
      <div id="top-ticker-track" class="top-ticker-track"></div>
    </div>

    <header class="hero">
      <div class="hero-main">
        <p class="kicker">MAD Club</p>
        <h1 id="site-title" class="hero-title">一车面包人</h1>
        <p id="site-tagline">内部娱乐网站 · 记录你们的高光和糗事</p>
      </div>
      <div class="hero-side">
        <button id="manage-toggle-btn" type="button" class="ghost">进入管理模式</button>
        <p class="hero-tip">未登录时仅可浏览。点击管理后输入密码可新增与删除内容。</p>
      </div>
    </header>

    <section id="login-panel" class="card hidden">
      <h2>登录与权限</h2>
      <div class="login-grid">
        <form id="admin-login-form" class="inline-form" data-edit-only="false">
          <label>
            管理密码
            <input id="admin-password" type="password" required placeholder="输入管理密码">
          </label>
          <button type="submit">进入管理模式</button>
        </form>
      </div>
      <p id="login-status" class="status">当前状态：未登录管理权限（只读）</p>
    </section>

    <section class="card" id="github-panel">
      <h2>GitHub Pages 持久化</h2>
      <p class="muted">
        页面默认读取 <code>data/mad-data.json</code>。进入管理模式后，新增或删除会自动同步到 GitHub；“同步到 GitHub”按钮可作为手动重试。
      </p>
      <div class="github-grid">
        <label>Owner <input id="gh-owner" type="text" placeholder="huangjialinn"></label>
        <label>Repo <input id="gh-repo" type="text" placeholder="mad.github.io"></label>
        <label>Branch <input id="gh-branch" type="text" value="main"></label>
        <label>Data Path <input id="gh-path" type="text" value="data/mad-data.json"></label>
        <label class="token-label">
          Token
          <input id="gh-token" type="password" placeholder="GitHub PAT（repo 权限）">
        </label>
      </div>
      <div class="actions">
        <button id="save-gh-config-btn" type="button" class="ghost">保存配置</button>
        <button id="reload-data-btn" type="button" class="ghost">重新加载数据</button>
        <button id="sync-github-btn" type="button" data-edit-only="true">同步到 GitHub</button>
      </div>
      <p id="sync-status" class="status">同步状态：未操作</p>
    </section>

    <section class="layout">
      <article class="card span-2">
        <h2>搞事日历</h2>
        <div class="calendar-head">
          <button id="prev-month-btn" type="button" class="ghost">上个月</button>
          <strong id="calendar-title"></strong>
          <button id="next-month-btn" type="button" class="ghost">下个月</button>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
        <div class="selected-events">
          <h3 id="selected-date-title"></h3>
          <div id="selected-date-events"></div>
        </div>
      </article>

      <article class="card hidden" data-admin-only="true">
        <h2>新增搞事</h2>
        <form id="event-form" data-edit-only="true">
          <label>
            日期
            <input id="event-date" type="date" required>
          </label>
          <label>
            类型
            <select id="event-type" required>
              <option value="drink">喝酒搞事</option>
              <option value="meal">吃饭搞事</option>
              <option value="sport">群体运动搞事</option>
            </select>
          </label>
          <label id="event-location-wrap">
            地点
            <input id="event-location" type="text" placeholder="如：小酒馆、火锅店、体育馆">
          </label>
          <label id="event-activity-wrap" class="hidden">
            运动项目
            <input id="event-activity" type="text" placeholder="如：羽毛球、篮球">
          </label>
          <label id="event-time-wrap" class="hidden">
            运动时间
            <input id="event-sport-time" type="datetime-local">
          </label>
          <label id="event-score-wrap" class="hidden">
            Y其林评分（-3 到 3）
            <input id="event-score" type="number" min="-3" max="3" step="1" value="0">
          </label>
          <div>
            <p class="label-like">参与成员</p>
            <div id="event-member-checkboxes" class="chips"></div>
          </div>
          <label id="event-images-wrap">
            图片
            <input id="event-images" type="file" accept="image/*" multiple>
            <small id="event-image-hint" class="muted">喝酒搞事最多 1 张；吃饭搞事最多 9 张；运动搞事不需要图片。手机建议单张 8MB 以内。</small>
          </label>
          <button type="submit">新增搞事</button>
        </form>
      </article>

      <article class="card">
        <h2>全场最佳</h2>
        <div id="honor-list" class="stack"></div>
      </article>

      <article class="card hidden" data-admin-only="true">
        <h2>新增全场最佳</h2>
        <form id="honor-form" data-edit-only="true">
          <label>
            日期
            <input id="honor-date" type="date" required>
          </label>
          <label>
            成员
            <select id="honor-member" required></select>
          </label>
          <label>
            最佳内容
            <textarea id="honor-story" rows="3" required placeholder="写点群友名场面"></textarea>
          </label>
          <label>
            图片（最多 9 张）
            <input id="honor-images" type="file" accept="image/*" multiple>
          </label>
          <button type="submit">新增全场最佳</button>
        </form>
      </article>

      <article class="card">
        <h2>灵宠</h2>
        <div id="pet-list" class="stack"></div>
      </article>

      <article class="card hidden" data-admin-only="true">
        <h2>新增灵宠</h2>
        <form id="pet-form" data-edit-only="true">
          <label>
            成员
            <select id="pet-member" required></select>
          </label>
          <label>
            灵宠名
            <input id="pet-name" type="text" required>
          </label>
          <label>
            年龄（岁）
            <input id="pet-age" type="number" min="0" max="40" required>
          </label>
          <label>
            图片（最多 9 张）
            <input id="pet-images" type="file" accept="image/*" multiple>
          </label>
          <button type="submit">新增灵宠</button>
        </form>
      </article>

      <article class="card">
        <h2>更新日志</h2>
        <div id="log-list" class="stack"></div>
      </article>
    </section>
  </div>
  <script src="./app.js"></script>
</body>
</html>
